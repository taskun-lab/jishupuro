<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>あつまれ じしゅきかくの森</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Kosugi+Maru&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --green:#5cb85c;--green-dk:#388e3c;--green-lt:#a5d6a7;
      --yellow:#ffd54f;--bg:#e8f5e9;--text:#2c1810;--text-s:#5d4037;
      --brown:#795548;--r:18px;--sh:0 6px 20px rgba(0,0,0,.11);--sh-h:0 12px 32px rgba(0,0,0,.18);
    }
    html{scroll-behavior:smooth}
    body{font-family:'Yomogi','Kosugi Maru','Hiragino Maru Gothic ProN',sans-serif;background:var(--bg);background-image:radial-gradient(circle at 1.5px 1.5px,rgba(100,180,100,.13) 1.5px,transparent 0);background-size:22px 22px;color:var(--text);overflow-x:hidden}
    img{max-width:100%;display:block}

    @keyframes bounceIn{0%{opacity:0;transform:scale(.75) translateY(28px)}65%{transform:scale(1.04) translateY(-5px)}100%{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(36px)}to{opacity:1;transform:translateY(0)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-13px)}}
    @keyframes floatAlt{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-11px) rotate(3deg)}}
    @keyframes leafSway{0%,100%{transform:rotate(-11deg) scale(1)}50%{transform:rotate(11deg) scale(1.06)}}
    @keyframes pulse{0%,100%{box-shadow:0 4px 18px rgba(56,142,60,.5)}50%{box-shadow:0 6px 34px rgba(56,142,60,.85)}}
    @keyframes arrowBounce{0%,100%{transform:translateX(-50%) translateY(0);opacity:.7}50%{transform:translateX(-50%) translateY(9px);opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}

    .rv{opacity:0;transform:translateY(36px);transition:opacity .55s ease,transform .55s ease}
    .rv.on,.rv.visible{opacity:1;transform:translateY(0)}
    .d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}.d5{transition-delay:.5s}

    /* ── HERO ── */
    .hero{position:relative;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px 110px;overflow:hidden;text-align:center}
    .hero-logo{width:min(370px,88vw);border-radius:22px;box-shadow:0 10px 40px rgba(0,0,0,.22);animation:bounceIn 1s ease both;position:relative;z-index:2;margin-bottom:22px}
    .hero-sub{font-size:clamp(.92rem,2.8vw,1.12rem);background:white;color:var(--green-dk);font-weight:bold;padding:10px 26px;border-radius:99px;box-shadow:var(--sh);animation:fadeUp .8s .7s ease both;position:relative;z-index:2}
    .hero-tree{position:absolute;bottom:60px;mix-blend-mode:multiply;pointer-events:none;z-index:1}
    .ht-l{left:-12px;width:clamp(90px,21vw,200px);animation:floatAlt 4.2s ease-in-out infinite}
    .ht-r{right:-10px;width:clamp(80px,18vw,170px);animation:floatAlt 3.7s ease-in-out infinite .5s}
    .ht-r2{right:clamp(52px,13vw,150px);bottom:52px;width:clamp(58px,12vw,118px);animation:float 5s ease-in-out infinite 1.1s}
    .hero-arrow{position:absolute;bottom:78px;left:50%;font-size:1.6rem;color:rgba(255,255,255,.82);text-shadow:0 2px 6px rgba(0,0,0,.3);animation:arrowBounce 2s ease-in-out infinite;z-index:4}
    .hero-wave{position:absolute;bottom:-2px;left:0;width:100%;z-index:3}
    .hero-wave svg{display:block;width:100%}

    /* ── BASE ── */
    .tanuki{max-width:600px;margin:0 auto;padding:22px 16px 4px}
    .tanuki img{width:100%;border-radius:var(--r);box-shadow:var(--sh)}
    .wv{display:block;width:100%;line-height:0}
    .sec{max-width:580px;margin:0 auto;padding:36px 18px}
    .sec-title{display:flex;align-items:center;gap:10px;font-size:clamp(1.08rem,3.5vw,1.3rem);font-weight:bold;color:var(--brown);margin-bottom:20px}
    .sec-title::after{content:'';flex:1;height:3px;background:linear-gradient(to right,var(--green-lt),transparent);border-radius:3px}
    .sec-icon{width:34px;height:34px;object-fit:contain;mix-blend-mode:multiply;flex-shrink:0;animation:leafSway 3.6s ease-in-out infinite}

    /* ── WHAT IS ── */
    .what-card{background:white;border-radius:var(--r);padding:22px 20px;box-shadow:var(--sh);border-left:6px solid var(--green);line-height:1.88;font-size:.94rem;color:var(--text-s)}
    .what-card p+p{margin-top:10px}
    .fruit-row{text-align:center;padding:2px 16px}
    .fruit-row img{max-width:min(340px,88vw);margin:0 auto;mix-blend-mode:multiply}

    /* ── STEPS ── */
    .steps{display:flex;flex-direction:column}
    .step-card{background:white;border-radius:var(--r);box-shadow:var(--sh);display:flex;align-items:flex-start;gap:14px;padding:18px;transition:transform .22s ease,box-shadow .22s ease}
    .step-card:hover{transform:translateY(-5px);box-shadow:var(--sh-h)}
    .step-num{background:var(--green);color:white;font-weight:bold;min-width:44px;width:44px;border-radius:22px;padding:7px 0;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;line-height:1;box-shadow:0 3px 8px rgba(92,184,92,.35)}
    .step-s{font-size:.52rem;letter-spacing:.04em;opacity:.88}
    .step-n{font-size:1.1rem;font-weight:bold;line-height:1.1}
    .step-title{font-weight:bold;font-size:1rem;margin-bottom:4px}
    .step-desc{font-size:.86rem;color:var(--text-s);line-height:1.76}
    .step-line{width:3px;height:16px;background:linear-gradient(to bottom,var(--green-lt),transparent);margin:2px 0 2px 38px;border-radius:3px}

    /* ── GALLERY ── */
    .gal-bg{background:linear-gradient(160deg,#e0f2f1 0%,#f9fbe7 100%);padding:36px 0}
    .gal-head{max-width:580px;margin:0 auto 18px;padding:0 18px}
    .gal-scroll{overflow-x:auto;padding:8px 18px 22px;cursor:grab;-webkit-overflow-scrolling:touch;scrollbar-width:none;user-select:none}
    .gal-scroll::-webkit-scrollbar{display:none}
    .gal-scroll:active{cursor:grabbing}
    .gal-track{display:flex;gap:14px;width:max-content}
    .gal-card{width:212px;flex-shrink:0;background:white;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;position:relative;transition:transform .22s ease,box-shadow .22s ease}
    .gal-card:hover{transform:translateY(-7px) scale(1.02);box-shadow:var(--sh-h)}
    .gal-card img{width:100%;height:126px;object-fit:cover}
    .gal-label{padding:10px 12px;font-size:.79rem;color:var(--text-s);font-weight:bold;line-height:1.4}

    /* ── AFTER / TEMPLATE ── */
    .after-list{display:flex;flex-direction:column;gap:12px}
    .after-card{background:white;border-radius:var(--r);box-shadow:var(--sh);padding:16px;display:flex;align-items:flex-start;gap:12px;font-size:.91rem;line-height:1.78;color:var(--text-s);transition:transform .22s ease,box-shadow .22s ease}
    .after-card:hover{transform:translateY(-4px);box-shadow:var(--sh-h)}
    .aico{font-size:1.5rem;flex-shrink:0}
    .atitle{font-weight:bold;color:var(--text);display:block;margin-bottom:3px}
    .caution{background:#fffde7;border-left:4px solid #ffb300;border-radius:10px;padding:9px 14px;font-size:.82rem;color:#6d4c00;margin-top:8px}
    .tpl-outer{background:linear-gradient(135deg,#dcedc8,#fff9c4 70%);border-radius:24px;padding:26px 18px 24px;box-shadow:var(--sh)}
    .tpl-hint{text-align:center;font-size:.84rem;color:var(--text-s);margin-bottom:14px}
    .tpl-text{background:white;border:2.5px dashed var(--green);border-radius:var(--r);padding:18px 16px;white-space:pre-wrap;font-family:inherit;font-size:.9rem;line-height:1.92;color:var(--text);margin-bottom:18px}
    .copy-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:280px;margin:0 auto;background:linear-gradient(135deg,#66bb6a,#388e3c);color:white;border:none;border-radius:99px;padding:16px 28px;font-family:inherit;font-size:1.05rem;font-weight:bold;cursor:pointer;animation:pulse 2.5s ease-in-out infinite;transition:transform .15s ease,background .3s ease}
    .copy-btn:active{transform:scale(.95)}
    .copy-btn.copied{background:linear-gradient(135deg,#ffd54f,#f9a825);animation:none;box-shadow:0 4px 20px rgba(249,168,37,.55)}

    /* ── FOOTER ── */
    footer{background:#2e7d32;color:white;text-align:center;padding:32px 20px;font-size:.88rem;line-height:2.1}
    .footer-trees{display:flex;justify-content:center;gap:16px;margin-bottom:14px}
    .footer-trees img{width:50px;filter:invert(1);opacity:.72;animation:float 4s ease-in-out infinite}
    .footer-trees img:nth-child(2){animation-delay:.65s;width:43px}
    .footer-trees img:nth-child(3){animation-delay:1.3s;width:47px}
    .footer-title{font-weight:bold;font-size:1rem}

    /* ── CORK BOARD ── */
    .cork-board{background:#c8956a;border:10px solid #7a4f1d;border-radius:var(--r);padding:16px;box-shadow:inset 0 2px 8px rgba(0,0,0,.25),var(--sh);display:flex;flex-direction:column;gap:12px;min-height:80px}
    .ev-row{background:#f5efd8;border-radius:12px;padding:12px 14px;box-shadow:2px 3px 8px rgba(0,0,0,.2);position:relative}
    .ev-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .ev-pin{font-size:1rem;flex-shrink:0}
    .ev-date{background:white;border-radius:6px;padding:3px 10px;font-weight:bold;font-size:.88rem;box-shadow:1px 1px 3px rgba(0,0,0,.15);flex-shrink:0}
    .ev-title{font-weight:bold;font-size:1.05rem;color:#3b2a1a;line-height:1.4;padding-left:2px}
    .ev-status{margin-left:auto;border-radius:99px;padding:3px 10px;font-size:.73rem;font-weight:bold;color:white;white-space:nowrap;flex-shrink:0}
    .board-msg{color:rgba(255,255,255,.85);text-align:center;padding:14px;font-size:.92rem}
    .b-photo-wrap{margin-top:14px}
    .b-photo-wrap img{width:100%;border-radius:var(--r);box-shadow:var(--sh)}

    /* ── Event controls ── */
    .ev-del-btn{background:#ef5350;color:white;border:none;border-radius:50%;width:26px;height:26px;font-size:.8rem;cursor:pointer;flex-shrink:0;display:none;align-items:center;justify-content:center}
    body.edit-mode .ev-del-btn{display:flex}
    .board-add-btn{background:rgba(255,255,255,.2);color:white;border:2px dashed rgba(255,255,255,.6);border-radius:10px;padding:10px;width:100%;font-family:inherit;font-size:.9rem;font-weight:bold;cursor:pointer;display:none}
    body.edit-mode .board-add-btn{display:block}

    /* ── Step controls ── */
    .step-del-btn{background:#ef5350;color:white;border:none;border-radius:50%;width:26px;height:26px;font-size:.8rem;cursor:pointer;flex-shrink:0;align-self:center;display:none;align-items:center;justify-content:center}
    body.edit-mode .step-del-btn{display:flex}
    .step-add-btn{background:rgba(92,184,92,.12);color:var(--green-dk);border:2px dashed var(--green);border-radius:10px;padding:10px;width:100%;font-family:inherit;font-size:.9rem;font-weight:bold;cursor:pointer;margin-top:8px;display:none}
    body.edit-mode .step-add-btn{display:block}

    /* ── Gallery edit ── */
    .gal-del{display:none;position:absolute;top:6px;right:6px;background:#ef5350;color:white;border:none;border-radius:50%;width:26px;height:26px;font-size:.8rem;cursor:pointer;z-index:10;align-items:center;justify-content:center}
    body.edit-mode .gal-del{display:flex}
    .gal-add-card{cursor:pointer;display:none!important;flex-direction:column}
    body.edit-mode .gal-add-card{display:flex!important}
    .gal-add-inner{width:212px;height:126px;display:flex;align-items:center;justify-content:center;background:#f1f8e9;font-size:2.5rem;color:var(--green)}

    /* ── Bulletin add button ── */
    .bphoto-add-btn{display:none;width:100%;margin-top:12px;padding:14px;background:var(--green);color:white;border:none;border-radius:99px;font-family:inherit;font-size:.9rem;font-weight:bold;cursor:pointer}
    body.edit-mode .bphoto-add-btn{display:block}

    /* ── Image edit overlay ── */
    .img-ed-wrap{position:relative}
    body.edit-mode .img-ed-wrap{cursor:pointer}
    body.edit-mode .img-ed-wrap::after{content:'📷 タップして画像を変更';position:absolute;inset:0;background:rgba(0,0,0,.45);color:white;font-weight:bold;font-size:.9rem;border-radius:var(--r);display:flex;align-items:center;justify-content:center;pointer-events:none}

    /* ── Toast ── */
    #toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:11px 22px;border-radius:99px;font-size:.88rem;font-weight:bold;opacity:0;transition:opacity .3s;pointer-events:none;z-index:3000;white-space:nowrap}
    #toast.show{opacity:1}

    /* ── Spinner ── */
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:4px}

    /* ── Drag ── */
    body.edit-mode .ev-row,
    body.edit-mode .gal-card:not(.gal-add-card){-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;cursor:grab}
    .drag-ghost{opacity:.2!important;transition:none!important}
    .drag-clone{position:fixed;pointer-events:none;z-index:9999;opacity:.93;box-shadow:0 12px 30px rgba(0,0,0,.4);border-radius:var(--r);transform:rotate(1.5deg);transition:none}
    .dragging-orig{opacity:.2!important;transition:none!important}

    /* ═════════════════════════════════════════
       BUILDER UI
       ═════════════════════════════════════════ */

    /* Admin toggle FAB */
    #editToggleBtn{position:fixed;bottom:24px;right:20px;z-index:900;background:#2e7d32;color:white;border:none;border-radius:99px;padding:12px 18px;font-family:inherit;font-size:.88rem;font-weight:bold;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.25);transition:background .2s,transform .15s;white-space:nowrap}
    #editToggleBtn:active{transform:scale(.93)}
    #editToggleBtn.editing{background:#e65100}

    /* Add section FAB */
    #addSecBtn{position:fixed;bottom:24px;right:152px;z-index:900;background:var(--green);color:white;border:none;border-radius:50%;width:52px;height:52px;font-size:1.6rem;font-weight:bold;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.25);display:none;align-items:center;justify-content:center;transition:transform .15s}
    body.edit-mode #addSecBtn{display:flex}
    #addSecBtn:active{transform:scale(.93)}

    /* Status bar */
    #statusMsg{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(46,125,50,.92);color:white;text-align:center;padding:8px;font-size:.82rem;font-weight:bold;pointer-events:none;display:none}
    #statusMsg:not(:empty){display:block}

    /* Section wrapper */
    .sec-wrapper{position:relative;width:100%}

    /* Section overlay */
    .sec-overlay{position:absolute;top:10px;right:10px;z-index:50;display:flex;gap:4px;background:rgba(255,255,255,.92);border-radius:99px;padding:4px 6px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
    .sec-ov-btn{background:#e8f5e9;color:var(--text);border:none;border-radius:50%;width:32px;height:32px;font-size:.92rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
    .sec-ov-btn:hover{background:#c8e6c9}
    .sec-ov-btn.danger{background:#ffebee;color:#c62828}
    .sec-ov-btn.danger:hover{background:#ef9a9a}

    /* ContentEditable active */
    .ce-active{outline:2px dashed rgba(92,184,92,.7);border-radius:4px;cursor:text;min-width:20px;transition:outline-color .2s}
    .ce-active:hover{outline-color:var(--green-dk)}
    .ce-active:focus{outline:2px solid var(--green-dk);background:rgba(255,255,255,.85)}

    /* Bottom sheet */
    .bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:1100;background:white;border-radius:24px 24px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.18);transform:translateY(100%);transition:transform .3s ease;max-height:70vh;overflow:hidden}
    .bottom-sheet.open{transform:translateY(0)}
    .bs-handle{width:40px;height:5px;background:#e0e0e0;border-radius:99px;margin:14px auto 0;cursor:pointer}
    .bs-inner{padding:16px 20px 32px;overflow-y:auto;max-height:calc(70vh - 40px)}
    .bs-title{font-weight:bold;color:var(--brown);margin-bottom:16px;font-size:1.05rem}
    .bs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .bs-block-btn{background:#f1f8e9;border:2px solid var(--green-lt);border-radius:var(--r);padding:14px 8px;font-family:inherit;font-size:.82rem;font-weight:bold;color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:background .15s,border-color .15s}
    .bs-block-btn:hover{background:#c8e6c9;border-color:var(--green)}
    .bs-icon{font-size:1.6rem}

    /* Event modal (dynamically created) */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal-box{background:white;border-radius:24px;padding:28px 22px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
    .modal-box input,.modal-box select{width:100%;padding:10px 14px;border:2px solid var(--green-lt);border-radius:10px;font-family:inherit;font-size:.95rem;outline:none;transition:border-color .2s;margin-bottom:10px;box-sizing:border-box}
    .modal-box input:focus,.modal-box select:focus{border-color:var(--green)}
    .modal-title{font-weight:bold;color:var(--brown);font-size:1.05rem;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .modal-icon{width:32px;height:32px;object-fit:contain;flex-shrink:0}
    .btn-cancel,.btn-add{flex:1;padding:12px;border:none;border-radius:99px;font-family:inherit;font-size:.92rem;font-weight:bold;cursor:pointer}
    .btn-cancel{background:#e0e0e0;color:var(--text-s)}
    .btn-add{background:linear-gradient(135deg,#66bb6a,#388e3c);color:white}

    /* Paragraph add button */
    .para-add-btn{margin-top:10px;background:rgba(92,184,92,.12);color:var(--green-dk);border:2px dashed var(--green);border-radius:10px;padding:8px;width:100%;font-family:inherit;font-size:.88rem;font-weight:bold;cursor:pointer;display:none}
    body.edit-mode .para-add-btn{display:block}

    @media(max-width:380px){.ht-r2{display:none}.gal-card{width:180px}.gal-card img{height:108px}}
  </style>
</head>
<body>

<!-- Status bar (shown when loading/saving) -->
<div id="statusMsg"></div>

<!-- Toast -->
<div id="toast"></div>

<!-- Page content root — sections are rendered here by builder.js -->
<main id="pageRoot"></main>

<!-- Admin toggle FAB -->
<button id="editToggleBtn">🌿 管理者ログイン</button>

<!-- Add section FAB (edit mode only) -->
<button id="addSecBtn" title="セクションを追加">＋</button>

<script type="module">
  import { initBuilder } from './builder.js';
  initBuilder();
</script>
</body>
</html>
